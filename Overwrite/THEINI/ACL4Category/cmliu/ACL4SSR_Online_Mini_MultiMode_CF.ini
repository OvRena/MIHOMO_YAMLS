;========================
; Netflix 专用放在 ACL 前面
;========================
ruleset=🎬 Netflix专用,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Netflix.list

;========================
; 全局 / GEOIP / FINAL
;========================
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

;========================
; 原始策略组
;========================
custom_proxy_group=🚀 节点选择`select`[]DIRECT`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连`.*
custom_proxy_group=☁️ CloudFlareCDN`select`[]🐟 漏网之鱼`[]🚀 节点选择`[]🎯 全球直连`.*

;========================
; Netflix / YouTube 专用组
;========================

; Netflix 手动选择
custom_proxy_group=🎬 Netflix专用`select`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇺🇸 美国节点`[]DIRECT

; YouTube CF fallback 自动
custom_proxy_group=🔯 CF专用故障`fallback`^CF`https://www.youtube.com/generate_204`60
custom_proxy_group=📺 YouTube自动`fallback`[]🔯 CF专用故障`[]🚀 节点选择`https://www.youtube.com/generate_204`60
custom_proxy_group=📺 YouTube专用`select`[]📺 YouTube自动`[]🔯 CF专用故障`[]🚀 节点选择`[]DIRECT`.*