[custom]

; ===== CF 专用自动组（YouTube 主力）=====
custom_proxy_group=🔯 CF自动`fallback`.*CF.*`http://www.gstatic.com/generate_204`300,5,50

; ===== 香港专用（Netflix 锁区）=====
custom_proxy_group=🇭🇰 香港专用`fallback`.*HK.*`http://www.gstatic.com/generate_204`600,5,50

; ===== Netflix 容灾组（香港挂了兜底机场）=====
custom_proxy_group=🎬 Netflix自动`fallback`[]🇭🇰 香港专用`[]✈️ 机场自动`600

; ===== 普通机场自动（排除 CF 和 HK）=====
custom_proxy_group=✈️ 机场自动`url-test`(?!.*CF|.*HK).*`http://www.gstatic.com/generate_204`600,5,50

; ===== 国内直连（腾讯、优酷等）=====
custom_proxy_group=🎯 国内直连`select`.*CN.*`DIRECT`

; ===== YouTube（自动容灾）=====
custom_proxy_group=📺 YouTube`fallback`[]🔯 CF自动`[]✈️ 机场自动`300

; ===== 默认流量（国外未匹配）=====
custom_proxy_group=🌍 默认`select`[]✈️ 机场自动`[]🔯 CF自动`[]DIRECT

; ===== 调试中心（平时不用）=====
custom_proxy_group=🛠 调试中心`select`.* 

; ===== 规则 =====
ruleset=🎯 国内直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=📺 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🎬 Netflix,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=🌍 默认,FINAL