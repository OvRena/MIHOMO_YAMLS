;========================
; 策略组
;========================

custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🔯 故障转移`[]🔮 负载均衡`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,100
custom_proxy_group=🔯 故障转移`fallback`.*`http://www.gstatic.com/generate_204`240
custom_proxy_group=🔮 负载均衡`load-balance`.*`http://www.gstatic.com/generate_204`240
custom_proxy_group=🔯 CF专用故障`fallback`^CF`https://www.youtube.com/generate_204`60
custom_proxy_group=📺 YouTube自动`fallback`[]🔯 CF专用故障`[]🔮 负载均衡`https://www.youtube.com/generate_204`60
custom_proxy_group=📺 YouTube`select`[]📺 YouTube自动`[]🔯 CF专用故障`[]🔮 负载均衡`[]🚀 节点选择`[]DIRECT`.*

;========================
; Netflix 专用策略组
;=========================

; 1️⃣ 香港节点优先组
custom_proxy_group=🇭🇰 奈飞香港优先`fallback`(HK|香港)`http://www.gstatic.com/generate_204`300

; 2️⃣ Netflix 主策略组（带 CF 最后备份）
; 香港 → 日本备用 → 美区备用 → CF 专用故障节点（可能是韩国）
custom_proxy_group=🎬 Netflix`select`[]🇭🇰 奈飞香港优先`[]🇯🇵 日本备用`[]🇺🇸 美区备用`[]🔯 CF专用故障

;========================
; 其他策略组
;========================
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连`[]♻️ 自动选择`[]🔯 故障转移`[]🔮 负载均衡`.*
custom_proxy_group=☁️ CloudFlareCDN`select`[]🐟 漏网之鱼`[]🚀 节点选择`[]🎯 全球直连`[]♻️ 自动选择`[]🔯 故障转移`[]🔮 负载均衡`.*
enable_rule_generator=true
overwrite_original_rules=true